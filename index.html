<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クイズ打刻システム</title>
    <style>
        /* 背景色を少し明るめのグレーに */
        body { 
            background-color: #f3f4f6; /* 明るいグレー */
            font-family: sans-serif;
            margin: 0; padding: 20px; color: #374151;
        }

        .row { display: grid; grid-template-columns: 50px 1fr; gap: 10px; margin-bottom: 25px; }
        .alphabet-label { font-weight: bold; font-size: 1.2rem; color: #6b7280; display: flex; align-items: flex-start; padding-top: 10px; }
        
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }

        /* カードも背景と同じ色で、枠線で区切る */
        .staff-card { 
            background-color: #f3f4f6; 
            border: 1px solid #d1d5db; 
            border-radius: 4px; padding: 10px; min-height: 60px; cursor: pointer;
        }

        /* ホバー時は少しだけ濃くして「押せる感」を出す */
        .staff-card:hover { background-color: #e5e7eb; }

        .card-header { display: flex; align-items: center; gap: 5px; font-size: 11px; margin-bottom: 8px; }
        .tag { border: 1px solid #333; padding: 0 4px; border-radius: 2px; font-size: 10px; font-weight: bold; }
        .tag-pink { color: #d63384; border-color: #d63384; }
        .tag-blue { color: #0d6efd; border-color: #0d6efd; }
        .staff-name { font-weight: bold; text-align: center; font-size: 14px; }

        /* モーダル */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .quiz-container { background: white; padding: 30px; border-radius: 8px; text-align: center; width: 85%; max-width: 350px; position: relative; }
        input[type="text"] { width: 90%; padding: 10px; margin: 15px 0; border: 1px solid #d1d5db; border-radius: 4px; font-size: 16px; }
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #submit-btn { background: #4b5563; color: white; }
        #close-btn { background: transparent; color: #9ca3af; text-decoration: underline; margin-top: 10px; display: block; width: 100%; }

        #celebration-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2; border-radius: 8px; }
        .hidden { display: none !important; }
        .error-msg { color: #dc2626; font-size: 12px; height: 18px; }

        @media (max-width: 600px) { .row { grid-template-columns: 1fr; } .alphabet-label { padding-top: 0; } }
    </style>
</head>
<body>

<div class="row">
    <div class="alphabet-label">あ</div>
    <div class="card-grid">
        <div class="staff-card" data-q="空の色は何色？" data-a="青">
            <div class="card-header"><span class="tag tag-pink">ア</span> <span>10001</span></div>
            <div class="staff-name">テスト太郎</div>
        </div>
        </div>
</div>

<div class="row">
    <div class="alphabet-label">か</div>
    <div class="card-grid">
        <div class="staff-card" data-q="カレーの隠し味といえば？" data-a="コーヒー">
            <div class="card-header"><span class="tag tag-blue">社</span> <span>20002</span></div>
            <div class="staff-name">カレー大好き</div>
        </div>
    </div>
</div>

<div id="quiz-overlay" class="overlay">
    <div class="quiz-container">
        <h3 id="question-text">問題</h3>
        <input type="text" id="answer-input" placeholder="回答を入力...">
        <div id="feedback" class="error-msg"></div>
        <button id="submit-btn">回答する</button>
        <button id="close-btn" onclick="closeModal()">キャンセル</button>
        
        <div id="celebration-screen" class="hidden">
            <h2 style="color: #059669;">正解！</h2>
            <p>お疲れ様でした。打刻を完了します。</p>
            <button onclick="closeModal()" style="background: #2563eb; color:white;">画面を閉じる</button>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        let currentAnswer = "";
        const overlay = document.getElementById('quiz-overlay');
        const input = document.getElementById('answer-input');
        const feedback = document.getElementById('feedback');

        // すべてのカードに対してクリックイベントを登録
        // カードを増やしてもこの1つの処理で全部対応できます
        document.addEventListener('click', (e) => {
            const card = e.target.closest('.staff-card');
            if (card) {
                currentAnswer = card.getAttribute('data-a');
                document.getElementById('question-text').innerText = card.getAttribute('data-q');
                input.value = "";
                feedback.innerText = "";
                document.getElementById('celebration-screen').classList.add('hidden');
                overlay.style.display = 'flex';
            }
        });

        document.getElementById('submit-btn').onclick = () => {
            if (input.value === currentAnswer) {
                document.getElementById('celebration-screen').classList.remove('hidden');
            } else {
                feedback.innerText = "× 間違っています。";
            }
        };
    });

    function closeModal() { document.getElementById('quiz-overlay').style.display = 'none'; }
</script>
</body>
</html>
