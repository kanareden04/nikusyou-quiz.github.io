<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クイズ打刻システム</title>
    <style>
        /* 1. 背景と基本設定：全体を同じグレーに */
        body { 
            background-color: #d1d5db; 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0; 
            padding: 20px; 
            color: #333;
        }

        .row { display: grid; grid-template-columns: 50px 1fr; gap: 10px; margin-bottom: 20px; }
        .alphabet-label { font-weight: bold; font-size: 18px; color: #555; display: flex; align-items: center; }
        
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }

        /* 2. カードのデザイン：背景色をbodyと統一し、アニメーションを削除 */
        .staff-card { 
            background-color: #d1d5db; /* 背景と同じ色 */
            border: 1px solid #9ca3af; /* 境界がわかるように少し濃い線の枠 */
            border-radius: 2px; 
            padding: 8px; 
            min-height: 50px; 
            cursor: pointer;
            /* アニメーション関連を削除 */
            transition: none; 
        }

        /* ホバー時の浮き出しを削除し、クリック感だけ残す */
        .staff-card:hover { 
            background-color: #c5cbd3; /* わずかに色を変えてクリックできることを示す */
        }

        .card-header { display: flex; align-items: center; gap: 5px; font-size: 11px; margin-bottom: 5px; }
        .tag { border: 1px solid #333; padding: 0 3px; border-radius: 1px; font-size: 10px; font-weight: bold; }
        .tag-pink { color: #d63384; border-color: #d63384; }
        .tag-blue { color: #0d6efd; border-color: #0d6efd; }
        .staff-name { font-weight: bold; text-align: center; font-size: 13px; }

        /* 3. モーダル（クイズ画面） */
        .overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); 
            justify-content: center; align-items: center; 
            z-index: 1000; 
        }
        .quiz-container { 
            background: white; 
            padding: 25px; 
            border-radius: 4px; 
            text-align: center; 
            width: 85%; max-width: 350px; 
            position: relative;
        }
        input[type="text"] { width: 90%; padding: 8px; margin: 15px 0; border: 1px solid #ccc; border-radius: 2px; }
        button { padding: 8px 16px; border: none; border-radius: 2px; cursor: pointer; font-size: 14px; }
        #submit-btn { background: #4b5563; color: white; margin-right: 5px; }
        #close-btn { background: #e5e7eb; color: #333; }

        /* 祝福レイヤー */
        #celebration-screen { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            z-index: 2; 
        }
        .hidden { display: none !important; }
        .error-msg { color: #b91c1c; font-size: 12px; height: 15px; margin-bottom: 10px; }

        @media (max-width: 600px) { .row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="row">
    <div class="alphabet-label">あ</div>
    <div class="card-grid">
        <div class="staff-card" data-q="このサイトの背景色は何色？" data-a="グレー">
            <div class="card-header"><span class="tag tag-pink">ア</span> <span>48789</span></div>
            <div class="staff-name">背景色確認</div>
        </div>
        <div class="staff-card" data-q="HTMLの『H』は何の略？" data-a="Hypertext">
            <div class="card-header"><span class="tag tag-blue">社</span> <span>22057</span></div>
            <div class="staff-name">IT用語クイズ</div>
        </div>
    </div>
</div>

<div id="quiz-overlay" class="overlay">
    <div class="quiz-container">
        <h3 id="question-text" style="margin-top:0;">問題</h3>
        <input type="text" id="answer-input" placeholder="答えを入力してください">
        <div id="feedback" class="error-msg"></div>
        <div>
            <button id="submit-btn">回答する</button>
            <button id="close-btn">閉じる</button>
        </div>
        
        <div id="celebration-screen" class="hidden">
            <h2 style="color: #16a34a; margin-bottom:10px;">正解！</h2>
            <p style="font-size: 14px; color: #4b5563;">今日も素晴らしい一日を。</p>
            <button onclick="closeModal()" style="background: #1d4ed8; color:white;">戻る</button>
        </div>
    </div>
</div>

<script>
    // HTMLが完全に読み込まれてから実行
    document.addEventListener('DOMContentLoaded', () => {
        let currentAnswer = "";
        const overlay = document.getElementById('quiz-overlay');
        const input = document.getElementById('answer-input');
        const feedback = document.getElementById('feedback');
        const questionText = document.getElementById('question-text');
        const celebScreen = document.getElementById('celebration-screen');

        // カードクリック時の処理
        document.querySelectorAll('.staff-card').forEach(card => {
            card.onclick = function() {
                // data属性から問題と答えを取得
                const q = this.getAttribute('data-q');
                const a = this.getAttribute('data-a');
                
                if (q && a) {
                    currentAnswer = a;
                    questionText.innerText = q;
                    input.value = "";
                    feedback.innerText = "";
                    celebScreen.classList.add('hidden');
                    overlay.style.display = 'flex';
                }
            };
        });

        // 回答ボタンクリック
        document.getElementById('submit-btn').onclick = function() {
            if (input.value === currentAnswer) {
                celebScreen.classList.remove('hidden');
            } else {
                feedback.innerText = "不正解です。入力内容を確認してください。";
            }
        };

        // 閉じるボタン
        document.getElementById('close-btn').onclick = closeModal;
    });

    function closeModal() {
        document.getElementById('quiz-overlay').style.display = 'none';
    }
</script>
</body>
</html>
